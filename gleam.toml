name = "gossamer"
version = "3.2.0"
gleam = ">= 1.14.0"
description = "Web API bindings for Gleam"
licences = ["Apache-2.0"]
repository = { type = "github", user = "han-tyumi", repo = "gossamer" }

target = "javascript"

[javascript]
typescript_declarations = true

[javascript.deno]
allow_read = true
allow_net = true

[dependencies]
gleam_stdlib = ">= 0.34.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
