[package]
versioned_files = ["gleam.toml"]
changelog = "CHANGELOG.md"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Command"
command = '[ "$(git branch --show-current)" = "main" ] || { echo "Must be on main" >&2; exit 1; }'
shell = true

[[workflows.steps]]
type = "Command"
command = '[ -z "$(git status --porcelain)" ] || { git status --short; echo "Working tree is dirty" >&2; exit 1; }'
shell = true

[[workflows.steps]]
type = "Command"
command = "just clean build check test examples"

# Re-render runtime-floor badges from runtime.toml and fail if
# README.md drifted (manual edits to the marker section, etc.). The
# lefthook hook normally keeps these in sync at commit time; this is
# the release-gate guardrail.
[[workflows.steps]]
type = "Command"
command = './scripts/render-runtime-floors.sh && { git diff --exit-code README.md || { echo "README runtime-floor badges out of sync — commit the render output" >&2; exit 1; }; }'
shell = true

[[workflows.steps]]
type = "PrepareRelease"

# Refresh each example's lock so the new gleam.toml version doesn't leave
# them stale. Folded into the prepare-release commit below.
[[workflows.steps]]
type = "Command"
command = 'for dir in examples/*/; do (cd "$dir" && gleam deps update gossamer) || exit 1; done'
shell = true

[[workflows.steps]]
type = "Command"
command = 'git add gleam.toml CHANGELOG.md examples/*/manifest.toml && git commit -m "chore: prepare release $version"'
shell = true

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"

[[workflows.steps]]
type = "Command"
command = "just publish --yes"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows]]
name = "get-version"
help_text = "Get the current version of the project"

[[workflows.steps]]
type = "Command"
command = 'echo "$version"'

[github]
owner = "han-tyumi"
repo = "gossamer"
