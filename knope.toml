[package]
versioned_files = ["gleam.toml"]
changelog = "CHANGELOG.md"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Command"
command = '[ "$(git branch --show-current)" = "main" ] || { echo "Must be on main" >&2; exit 1; }'
shell = true

[[workflows.steps]]
type = "Command"
command = '[ -z "$(git status --porcelain)" ] || { git status --short; echo "Working tree is dirty" >&2; exit 1; }'
shell = true

[[workflows.steps]]
type = "Command"
command = "just gate"

# Re-render runtime-floor badges from runtime.toml and fail if
# README.md drifted (manual edits to the marker section, etc.). The
# lefthook hook normally keeps these in sync at commit time; this is
# the release-gate guardrail.
[[workflows.steps]]
type = "Command"
command = './scripts/render-runtime-floors.sh && { git diff --exit-code README.md || { echo "README runtime-floor badges out of sync — commit the render output" >&2; exit 1; }; }'
shell = true

# The release version and its CHANGELOG.md section are committed by hand
# before running this workflow (along with refreshed example locks via
# `gleam deps update gossamer` in each example). Release reads the version
# from gleam.toml, tags it, and lifts the matching CHANGELOG.md section
# into the GitHub release notes.
[[workflows.steps]]
type = "Release"

[[workflows.steps]]
type = "Command"
command = "just publish --yes"

[[workflows]]
name = "get-version"
help_text = "Get the current version of the project"

[[workflows.steps]]
type = "Command"
command = 'echo "$version"'

[github]
owner = "han-tyumi"
repo = "gossamer"
