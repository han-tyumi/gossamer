[package]
versioned_files = ["gleam.toml"]
changelog = "CHANGELOG.md"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Command"
command = '[ "$(git branch --show-current)" = "main" ] || { echo "Must be on main" >&2; exit 1; }'
shell = true

[[workflows.steps]]
type = "Command"
command = '[ -z "$(git status --porcelain)" ] || { git status --short; echo "Working tree is dirty" >&2; exit 1; }'
shell = true

[[workflows.steps]]
type = "Command"
command = "just clean build check test examples"

[[workflows.steps]]
type = "PrepareRelease"

[[workflows.steps]]
type = "Command"
command = 'git commit -m "chore: prepare release $version"'

[[workflows.steps]]
type = "Command"
command = "git push"

[[workflows.steps]]
type = "Release"

[[workflows.steps]]
type = "Command"
command = "just publish --yes"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows]]
name = "get-version"
help_text = "Get the current version of the project"

[[workflows.steps]]
type = "Command"
command = 'echo "$version"'

[github]
owner = "han-tyumi"
repo = "gossamer"
